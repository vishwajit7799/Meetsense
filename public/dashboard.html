<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — MeetSense</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0a0a0f; --ink2: #3d3d4e; --ink3: #8888a0;
    --paper: #fafaf8; --surface: #f2f2ef; --accent: #4f46e5;
    --border: #e2e2dc; --green: #16a34a; --amber: #d97706; --red: #dc2626;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--paper); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--ink); text-decoration: none; }
  .logo span { color: var(--accent); }
  .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--ink2); }
  .avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 500; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; text-decoration: none; cursor: pointer; border: 1px solid var(--border); background: var(--paper); color: var(--ink2); transition: all .15s; }
  .btn:hover { border-color: var(--ink3); }

  .main { max-width: 960px; margin: 0 auto; padding: 32px; }
  h1 { font-family: 'Instrument Serif', serif; font-size: 28px; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--ink3); margin-bottom: 32px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .stat-num { font-family: 'Instrument Serif', serif; font-size: 36px; color: var(--ink); }
  .stat-label { font-size: 13px; color: var(--ink3); margin-top: 2px; }

  /* Meetings list */
  .card { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h2 { font-size: 15px; font-weight: 500; }
  .meeting-row { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; cursor: pointer; transition: background .1s; }
  .meeting-row:last-child { border-bottom: none; }
  .meeting-row:hover { background: var(--surface); }
  .meeting-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .meeting-info { flex: 1; min-width: 0; }
  .meeting-subject { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meeting-meta { font-size: 12px; color: var(--ink3); margin-top: 2px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-completed { background: #dcfce7; color: #15803d; }
  .badge-pending   { background: #fef9c3; color: #a16207; }
  .badge-joining   { background: #dbeafe; color: #1d4ed8; }
  .badge-in_progress { background: #ede9fe; color: #6d28d9; }
  .badge-failed    { background: #fee2e2; color: #b91c1c; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
  .overlay.open { display: flex; }
  .modal { background: var(--paper); border-radius: 16px; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 16px; font-weight: 500; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); padding: 4px; line-height: 1; }
  .modal-body { padding: 24px; font-size: 14px; line-height: 1.7; }
  .modal-body h5 { font-size: 13px; font-weight: 600; color: var(--ink); margin: 16px 0 8px; border-left: 3px solid var(--accent); padding-left: 8px; }
  .modal-body ul { padding-left: 18px; color: var(--ink2); }
  .modal-body li { margin-bottom: 4px; }
  .modal-body .meta { background: var(--surface); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: var(--ink2); line-height: 1.8; font-size: 13px; }

  .empty { padding: 48px; text-align: center; color: var(--ink3); }
  .empty p { font-size: 14px; margin-top: 8px; }

  @media (max-width: 600px) {
    .main { padding: 20px; }
    .stats { grid-template-columns: 1fr 1fr; }
    nav { padding: 14px 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Meet<span>Sense</span></a>
  <div class="user-info">
    <div class="avatar" id="avatarEl">?</div>
    <span id="userNameEl">Loading...</span>
    <a href="#" class="btn" id="logoutBtn">Sign out</a>
  </div>
</nav>

<main class="main">
  <h1>Your meetings</h1>
  <p class="subtitle" id="subtitleEl">Loading your account...</p>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total meetings</div></div>
    <div class="stat"><div class="stat-num" id="statCompleted">—</div><div class="stat-label">Summaries sent</div></div>
    <div class="stat"><div class="stat-num" id="statUpcoming">—</div><div class="stat-label">Upcoming today</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>All meetings</h2>
      <button class="btn" onclick="loadMeetings()">↻ Refresh</button>
    </div>
    <div id="meetingsList">
      <div class="empty">
        <div style="font-size:32px">📅</div>
        <p>Loading meetings...</p>
      </div>
    </div>
  </div>
</main>

<!-- Summary modal -->
<div class="overlay" id="summaryOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Meeting summary</h3>
      <button class="close-btn" onclick="document.getElementById('summaryOverlay').classList.remove('open')">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  const sid = new URLSearchParams(location.search).get('sid') || localStorage.getItem('ms_sid');
  if (sid) localStorage.setItem('ms_sid', sid);
  if (!sid) { location.href = '/'; }

  const headers = { 'x-session-id': sid };

  function platformIcon(url = '') {
    if (url.includes('teams')) return '🔵';
    if (url.includes('zoom'))  return '🟡';
    if (url.includes('meet'))  return '🟢';
    return '📹';
  }

  function badgeHtml(status) {
    const labels = { completed:'Summarised', pending:'Scheduled', joining:'Joining...', in_progress:'Live', failed:'Failed' };
    return `<span class="badge badge-${status}">${labels[status] || status}</span>`;
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  async function loadUser() {
    const res = await fetch('/api/me', { headers });
    if (!res.ok) { location.href = '/'; return; }
    const user = await res.json();
    document.getElementById('userNameEl').textContent = user.name || user.email;
    document.getElementById('avatarEl').textContent = (user.name || user.email || '?')[0].toUpperCase();
    document.getElementById('subtitleEl').textContent = `Connected as ${user.email}`;
    document.getElementById('logoutBtn').href = `/auth/logout?sid=${sid}`;
  }

  async function loadStats() {
    const res = await fetch('/api/stats', { headers });
    const s = await res.json();
    document.getElementById('statTotal').textContent = s.total;
    document.getElementById('statCompleted').textContent = s.completed;
    document.getElementById('statUpcoming').textContent = s.upcoming;
  }

  async function loadMeetings() {
    const res = await fetch('/api/meetings', { headers });
    const meetings = await res.json();
    const el = document.getElementById('meetingsList');

    if (!meetings.length) {
      el.innerHTML = `<div class="empty"><div style="font-size:32px">📭</div><p>No meetings yet. MeetSense will automatically pick up meetings from your Outlook calendar.</p></div>`;
      return;
    }

    el.innerHTML = meetings.map(m => `
      <div class="meeting-row" onclick="openSummary('${m.id}', \`${(m.subject||'').replace(/`/g,'')}\`)">
        <div class="meeting-icon">${platformIcon(m.meeting_url)}</div>
        <div class="meeting-info">
          <div class="meeting-subject">${m.subject || 'Untitled meeting'}</div>
          <div class="meeting-meta">${fmtDate(m.start_time)}</div>
        </div>
        ${badgeHtml(m.status)}
      </div>
    `).join('');
  }

  async function openSummary(id, title) {
    document.getElementById('modalTitle').textContent = title || 'Meeting summary';
    document.getElementById('modalBody').innerHTML = '<p style="color:var(--ink3)">Loading...</p>';
    document.getElementById('summaryOverlay').classList.add('open');

    const res = await fetch(`/api/meetings/${id}`, { headers });
    const m = await res.json();

    if (m.summary) {
      document.getElementById('modalBody').innerHTML = m.summary;
    } else if (m.status === 'completed') {
      document.getElementById('modalBody').innerHTML = '<p>Summary not available.</p>';
    } else {
      document.getElementById('modalBody').innerHTML = `
        <p style="color:var(--ink2)">Status: <strong>${m.status}</strong></p>
        <p style="color:var(--ink3);margin-top:8px;font-size:13px;">
          ${m.status === 'pending' ? 'The bot is scheduled to join this meeting.' :
            m.status === 'in_progress' ? 'Meeting is in progress — summary will arrive by email when it ends.' :
            m.status === 'failed' ? 'The bot encountered an issue with this meeting.' :
            'Processing...'}
        </p>`;
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('summaryOverlay')) {
      document.getElementById('summaryOverlay').classList.remove('open');
    }
  }

  loadUser();
  loadStats();
  loadMeetings();
  setInterval(loadMeetings, 30000); // auto-refresh every 30s
</script>
</body>
</html>
